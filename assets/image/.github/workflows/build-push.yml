name: Build and Push cc-runtime-minimal

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/agents-slim
  TAG: cc-runtime-minimal

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate dated tag
        id: date
        run: echo "tag=$(date +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}-${{ steps.date.outputs.tag }}
